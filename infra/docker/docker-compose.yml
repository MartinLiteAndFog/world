services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: street-stocks-postgres
    environment:
      POSTGRES_DB: street_stocks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d street_stocks"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ../../packages/db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
